<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>직거래장터 지도 대시보드</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"><link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"><link rel="stylesheet" href="styles.css"></head><body><div class="page">
    <div class="page-header">
      <h1>직거래장터 지도 대시보드</h1>
      <p>예시 이미지처럼 지도 중심 레이아웃으로 재구성했습니다. 기준일: 2026년 7월</p>
    </div>

    <div class="map-shell">
      <div id="map"></div>

      <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#1f9d55"></span>운영중(이번달)</div>
        <div class="legend-item"><span class="dot" style="background:#2563eb"></span>연중운영(요일확인)</div>
        <div class="legend-item"><span class="dot" style="background:#64748b"></span>휴장(비시즌)</div>
      </div>
      <div id="drawerOverlay" class="drawer-overlay"></div>

      <aside id="marketDrawer" class="market-drawer" aria-hidden="true">
        <div class="drawer-header">
          <div>
            <h2>이번 달 운영중인 직거래장터</h2>
            <p><span id="operatingCount"></span>을 확인할 수 있습니다.</p>
          </div>
          <button id="closeDrawer" class="close-drawer" aria-label="닫기">×</button>
        </div>

        <div class="drawer-toolbar">
          <select id="regionFilter">
            <option value="">전체 지역</option>
          </select>
          <input id="keywordInput" type="text" placeholder="장터명, 주소, 운영주체 검색"/>
        </div>

        <div class="drawer-summary">
          <span class="pill" id="pillTotal"></span>
          <span class="pill" id="pillOperating"></span>
          <span class="pill" id="pillToday"></span>
          <span class="pill" id="pillYear"></span>
          <span class="pill" id="pillClosed"></span>
        </div>

        <div class="drawer-tabs">
          <button id="tabToday" class="drawer-tab active">오늘 운영</button>
          <button id="tabMonth" class="drawer-tab">이번 달 운영</button>
        </div>

        <div id="todayWeatherSummary" class="weather-summary"></div>
        <div class="drawer-list" id="marketList"></div>

        <div class="drawer-note">
          ※ 카드의 “지도에서 보기”를 누르면 지도 위치가 이동합니다.<br/>
          ※ “Google Maps 열기”는 새 탭에서 해당 주소를 엽니다.
        </div>
      </aside>

      <button id="openDrawer" class="open-drawer-btn">
        이번 달 운영중 장터 보기
      </button>
</div>
  </div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script><script src="data1.js"></script><script src="data2.js"></script><script src="app.js"></script></body></html>
